<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistructMe - Meme Popup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .meme-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
            position: relative;
        }
        
        .meme-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .quote {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: #ff3742;
            transform: scale(1.05);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .timer {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="meme-container">
        <img id="memeImage" class="meme-image" src="" alt="Meme">
        <div id="quote" class="quote"></div>
        <button class="close-btn" onclick="closeWindow()">Close This Distraction</button>
    </div>

    <script>
        const demotivatingQuotes = [
            "Stop switching tabs! Focus on one thing!",
            "You're just procrastinating by switching tabs.",
            "This tab switching is getting out of hand.",
            "You switched tabs again? Really?",
            "Your attention span is shorter than this popup.",
            "Stop. Just stop switching tabs.",
            "You're not being productive, you're just browsing.",
            "Every tab switch is a step away from your goals.",
            "Focus! One tab at a time!",
            "You're addicted to tab switching.",
            "This popup is more focused than you are.",
            "Stop the tab madness!",
            "You switched tabs? Here's a meme to distract you more!",
            "Tab switching is not productivity.",
            "You're just avoiding work by switching tabs."
        ];

        const memeImages = [
            "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
            "https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif",
            "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
            "https://media.giphy.com/media/26BRrSvJUaB0xcoqI/giphy.gif",
            "https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif"
        ];

        function showRandomMeme() {
            const randomQuote = demotivatingQuotes[Math.floor(Math.random() * demotivatingQuotes.length)];
            const randomImage = memeImages[Math.floor(Math.random() * memeImages.length)];
            
            document.getElementById('quote').textContent = randomQuote;
            document.getElementById('memeImage').src = randomImage;
        }

        function closeWindow() {
            window.close();
        }

        // Show meme immediately when page loads
        showRandomMeme();
    </script>
</body>
</html>
